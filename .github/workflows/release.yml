name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_COLOR: 1

jobs:
  build:
    name: Build and test
    uses: ./.github/workflows/build-and-test.yml
    with:
      upload-release: true

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get version and verify tag
        run: |
          PKG_VERSION="v$(jq -r '.version' package.json)"
          LATEST_TAG=$(git tag --list 'v*' --sort=-version:refname | head -n1)
          if [ "$PKG_VERSION" != "$LATEST_TAG" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match latest v* tag ($LATEST_TAG)"
            exit 1
          fi
          echo "RELEASE_TAG=$PKG_VERSION" >> $GITHUB_ENV

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          name: release
          path: release/

      - name: Create release if needed
        run: gh release view $RELEASE_TAG || gh release create $RELEASE_TAG --draft

      - name: Add files to release
        run: gh release upload $RELEASE_TAG --clobber release/*.tar.gz

      - name: Update release
        run: gh release edit $RELEASE_TAG --draft=false --latest --prerelease=false --notes-file=release/notes.md

      - name: Trigger Docker release
        run: |
          curl -X POST \
            --fail-with-body \
            -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/versatiles-org/versatiles-docker/actions/workflows/release.yml/dispatches \
            -d '{"ref":"main","inputs":{"build_base":false,"build_frontend":true,"build_nginx":false,"build_tippecanoe":false,"build_tilemaker":false,"build_gdal":false}}'
